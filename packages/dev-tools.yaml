packages:
- name: git
  description: Git version control
  type: apt
  package: git
  check: which git
  depends_on:
  - system-update
- name: gh
  description: GitHub CLI
  type: apt
  package: gh
  check: which gh
  depends_on:
  - system-update
- name: vim
  description: Vim editor (fallback)
  type: apt
  package: vim
  check: which vim
- name: neovim
  description: Text editor (latest stable binary release)
  type: script
  check: which nvim
  commands:
  - curl -LO https://github.com/neovim/neovim/releases/latest/download/nvim-linux-x86_64.tar.gz
  - sudo rm -rf /opt/nvim-linux-x86_64
  - sudo tar -C /opt -xzf nvim-linux-x86_64.tar.gz
  - ln -sf /opt/nvim-linux-x86_64/bin/nvim ~/.local/bin/nvim
- name: tmux
  description: Terminal multiplexer
  type: apt
  package: tmux
  check: which tmux
- name: chezmoi
  description: Dotfile manager
  type: script
  check: which chezmoi
  commands:
  - sh -c "$(curl -fsLS https://get.chezmoi.io)"
- name: delta
  description: Syntax-aware diff viewer for git
  type: apt
  package: git-delta
  check: which delta
- name: diff-so-fancy
  description: Pretty git diffs
  type: script
  check: which diff-so-fancy
  commands:
  - sudo curl -fsSL https://raw.githubusercontent.com/so-fancy/diff-so-fancy/master/diff-so-fancy -o /usr/local/bin/diff-so-fancy
  - sudo chmod +x /usr/local/bin/diff-so-fancy
- name: ducker-tui
  description: Docker TUI (lazydocker)
  type: script
  check: which lazydocker
  depends_on:
  - docker
  commands:
  - curl -fsSL https://raw.githubusercontent.com/jesseduffield/lazydocker/master/scripts/install_update_linux.sh | bash
- name: zed-server
  description: Zed editor remote server
  type: script
  check: which zed
  commands:
  - curl -fsSL https://zed.dev/install.sh | sh
- name: gopass
  description: Team password manager
  type: go
  check: which gopass
  commands:
  - go install github.com/gopasspw/gopass@latest
- name: pcopy
  description: Encrypted clipboard sync
  type: go
  check: which pcopy
  commands:
  - go install heckel.io/pcopy@latest
- name: gum
  description: Charmbracelet TUI styling toolkit
  type: go
  check: which gum
  commands:
  - go install github.com/charmbracelet/gum@latest
- name: bubbletea
  description: Go TUI framework (library)
  type: script
  check: test -d "$(go env GOMODCACHE)/github.com/charmbracelet/bubbletea@v"
  commands:
  - mkdir -p /tmp/go-mod-bootstrap && rm -rf /tmp/go-mod-bootstrap/go.mod && cd /tmp/go-mod-bootstrap && go mod init bootstrap 2>/dev/null && go get github.com/charmbracelet/bubbletea@latest && rm -rf /tmp/go-mod-bootstrap/go.mod
- name: lipgloss
  description: Go terminal styling (library)
  type: script
  check: test -d "$(go env GOMODCACHE)/github.com/charmbracelet/lipgloss@v"
  commands:
  - mkdir -p /tmp/go-mod-bootstrap && rm -rf /tmp/go-mod-bootstrap/go.mod && cd /tmp/go-mod-bootstrap && go mod init bootstrap 2>/dev/null && go get github.com/charmbracelet/lipgloss@latest && rm -rf /tmp/go-mod-bootstrap/go.mod
- name: bubbles
  description: Go TUI components (library)
  type: script
  check: test -d "$(go env GOMODCACHE)/github.com/charmbracelet/bubbles@v"
  commands:
  - mkdir -p /tmp/go-mod-bootstrap && rm -rf /tmp/go-mod-bootstrap/go.mod && cd /tmp/go-mod-bootstrap && go mod init bootstrap 2>/dev/null && go get github.com/charmbracelet/bubbles@latest && rm -rf /tmp/go-mod-bootstrap/go.mod
- name: sesh
  description: Smart tmux session manager
  type: go
  check: which sesh
  commands:
  - go install github.com/joshmedeski/sesh/v2@latest
- name: browsr
  description: CLI file browser
  type: pip
  package: browsr
  check: which browsr
- name: crawley
  description: Fast web crawler
  type: go
  package: github.com/s0rg/crawley/cmd/crawley
  check: which crawley
- name: pnpm
  description: Fast disk-efficient package manager
  type: npm
  check: which pnpm
  commands:
  - npm install -g pnpm
- name: biome
  description: Formatter and linter for web files
  type: npm
  check: which biome
  commands:
  - npm install -g @biomejs/biome
- name: pyright
  description: Static type checker for Python
  type: npm
  check: which pyright
  commands:
  - npm install -g pyright
- name: sqlite3
  description: SQLite database CLI
  type: apt
  package: sqlite3
  check: which sqlite3
- name: black
  description: Uncompromising Python code formatter
  type: pip
  package: black
  check: which black
- name: pyinstrument
  description: Statistical Python profiler
  type: pip
  package: pyinstrument
  check: which pyinstrument
- name: fastapi
  description: FastAPI web framework CLI
  type: pip
  package: fastapi
  check: which fastapi
- name: uvicorn
  description: ASGI server for Python
  type: pip
  package: uvicorn
  check: which uvicorn
- name: httpx
  description: Next-gen HTTP client with CLI
  type: pip
  package: httpx
  check: which httpx
- name: typer
  description: CLI library with shell completion
  type: pip
  package: typer
  check: which typer
